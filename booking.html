    Boost Force Mobile Car Wash | Cape Town
    </title>
    <meta
    name="description"
    content="Professional mobile car wash in Cape Town.">
    <meta
    name="keywords"
    content="mobile car wash, cape town, car detailing">
    <meta
    name="author"
    content="Your Name">
    <!-- OPEN GRAPH -->
    <meta
    property="og:title"
    content="Boost Force Car Wash">
    <meta
    property="og:type"
    content="website">
    <meta
    property="og:description"
    content="Professional Mobile Car Wash">
    <link rel="stylesheet" href="css/style.css">
    <meta
    property="og:description"
    content="Professional Mobile Car Wash">

</head>
<body>
    
<!-- 1. HEADER NAVIGATION (Stays the same on all pages) -->
<header>
    <div class="nav-container">
        <div class="logo">BOOST <span>FORCE</span> CAR WASH </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="enquiry.html">Enquiry</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>
    <!-- MAIN CONTENT -->
    <main>

        <!-- BOOKING SECTION -->
        <section class="booking-section">

        <h2 class="booking-heading">
        Book Your Car Wash Service
        </h2>

            <p class="booking-text">
             Use the booking form below to schedule your mobile car wash service quickly and conveniently.
            </p>

            <!-- BOOKING FORM -->
            <form>

                <!-- FULL NAME -->
                <label for="fullname">Full Name:</label><br>
                <input type="text" id="fullname" name="fullname"><br><br>

                <!-- CONTACT DETAILS -->
                <label for="contact">Contact Details:</label><br>
                <input type="text" id="contact" name="contact"><br><br>

                <!-- SERVICE SELECTION -->
                <label for="service">Preferred Service:</label><br>
                <select id="service" name="service">
                    <option>Exterior Wash</option>
                    <option>Interior Cleaning</option>
                    <option>Full Valet Service</option>
                    <option>Engine Cleaning</option>
                </select><br><br>

                <!-- DATE -->
                <label for="date">Booking Date:</label><br>
                <input type="date" id="date" name="date"><br><br>

                <!-- TIME -->
                <label for="time">Booking Time:</label><br>
                <input type="time" id="time" name="time"><br><br>

                <!-- ADDRESS -->
                <label for="address">Location / Address:</label><br>
                <input type="text" id="address" name="address"><br><br>

                <!-- SPECIAL INSTRUCTIONS -->
                <label for="instructions">Special Instructions:</label><br>
                <textarea id="instructions" name="instructions" rows="4" cols="40"></textarea><br><br>

                <!-- SUBMIT BUTTON -->
                <button type="submit">Submit Booking</button>

            </form>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Boost Force Mobile Car Wash</p>
    </footer>

</body>
</html>
