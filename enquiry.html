<head>

    <!-- PART 3 : SEO -->

          content="width=device-width, initial-scale=1.0">
    <title>
        Service Enquiry | Boost Force Mobile Car Wash
    </title>
    <meta
    name="description"
    content="Enquire about mobile car wash services and prices in Cape Town.">
    <meta
    name="keywords"
    content="car wash enquiry, mobile detailing, Cape Town">
    <meta
    name="author"
    content="Your Name">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->

<header>
    <div class="nav-container">
        <div class="logo">
            BOOST <span>FORCE</span> CAR WASH
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="enquiry.html">Enquiry</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>

<!-- MAIN -->

<main>
<section class="enquiry-section">
<h2>Service Enquiry</h2>
<p>
Complete the form below to enquire about pricing and availability.
</p>
<form id="enquiryForm">
<label for="fullname">
Full Name
</label>
<input
type="text"
id="fullname"
required>

<label for="email">
Email Address
</label>
<input
type="email"
id="email"
required>

<label for="phone">
Phone Number
</label>
<input
type="tel"
id="phone"
pattern="[0-9]{10}"
required>

<label for="service">
Select Service
</label>
<select id="service">
<option value="80">

Exterior Wash - R80
</option>
<option value="120">

Interior Cleaning - R120
</option>
<option value="180">

Wax and Polish - R180
</option>
<option value="350">

Full Vehicle Detailing - R350
</option>
</select>

<label for="date">
Preferred Date

</label>
<input
type="date"
id="date"
required>
<button type="submit">
Submit Enquiry
</button>
</form>
<div id="responseBox"></div>
</section>
</main>
<footer>
<p>
© 2026 Boost Force Mobile Car Wash
</p>
</footer>
<script src="js/main.js"></script>
</body>
</html>
